<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Synergy - Student Intelligence &amp; Placement Readiness</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13", // Theme default
                        "custom-bg": "#121212",
                        "custom-surface": "#1C1C1C",
                        "custom-card": "#232323",
                        "accent": "#D4A373",
                        "accent-deep": "#B08968",
                        "accent-soft": "#E9C46A",
                        "accent-secondary": "#6B9080",
                        "text-main": "#F1F5F9",
                        "text-muted": "#94A3B8",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #121212;
        }
        .glow-effect {
            box-shadow: 0 0 50px -12px rgba(212, 163, 115, 0.15), 0 0 80px -20px rgba(107, 144, 128, 0.1);
        }
        .accent-gradient-text {
            background: linear-gradient(135deg, #D4A373 0%, #E9C46A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-custom-bg text-text-main flex items-center justify-center min-h-screen p-4">
<!-- Background Decorative Elements -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-accent/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-accent-secondary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="w-full max-w-[480px] z-10">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-8">
<div class="flex items-center gap-3 text-accent mb-2">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">
                    rocket_launch
                </span>
<h1 class="text-3xl font-bold tracking-tight text-text-main">Synergy</h1>
</div>
<p class="text-text-muted text-sm text-center">Student Intelligence &amp; Placement Readiness</p>
</div>
<!-- Login Card -->
<div class="bg-custom-card rounded-2xl p-8 glow-effect border border-white/5 shadow-2xl">
<div class="mb-8">
<h2 class="text-2xl font-bold text-text-main mb-1">Welcome back</h2>
<p class="text-text-muted text-sm">Please enter your details to sign in</p>
</div>
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-text-main/80 ml-1">Email address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-muted text-xl">
                            mail
                        </span>
<input class="w-full bg-custom-surface border border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-text-main placeholder:text-text-muted/50 focus:outline-none focus:ring-2 focus:ring-accent-secondary/50 focus:border-accent-secondary/50 transition-all" placeholder="student@university.edu" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-text-main/80 ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-muted text-xl">
                            lock
                        </span>
<input class="w-full bg-custom-surface border border-white/10 rounded-xl py-3.5 pl-12 pr-12 text-text-main placeholder:text-text-muted/50 focus:outline-none focus:ring-2 focus:ring-accent-secondary/50 focus:border-accent-secondary/50 transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-text-muted hover:text-accent transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between text-sm py-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-white/20 bg-custom-surface text-accent focus:ring-accent/50 focus:ring-offset-custom-card" type="checkbox"/>
<span class="text-text-muted group-hover:text-text-main transition-colors">Remember me</span>
</label>
<a class="text-accent hover:text-accent-soft font-medium transition-colors" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full bg-accent hover:bg-accent-soft text-custom-bg font-bold py-4 rounded-xl transition-all shadow-lg shadow-accent/20 active:scale-[0.98]" type="submit">
                    Sign In
                </button>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-white/5"></div>
<span class="flex-shrink mx-4 text-text-muted text-xs uppercase tracking-widest">Or continue with</span>
<div class="flex-grow border-t border-white/5"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-custom-surface hover:bg-white/5 border border-white/10 py-3 rounded-xl transition-all" type="button">
<img alt="Google" class="w-5 h-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuASWRKh9iRXJ5Fd6Ldjy-CIz31JT3LH1EibUeqyQ0GO9HksTie969UcW5pnMQBmG3Q2QyY3cwdk4Nxstgt90MqXWzUhcTkCowsr_CidPJcTzZgd1JGFMsS_hC5DMneEL_1YiOrfPeqwLiAEsvBnVdfCebSULPpyq7HqwUoNTQikXdBtauf1mOy31Do9AJ4RhY6_uyl3GSoZUsmQ1AM3by_rs5WyFTs_zzIEPPfLArFfY_WCEpe2NUGaGxMkDtVprFUB-Z-ZhELfA6k"/>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 bg-custom-surface hover:bg-white/5 border border-white/10 py-3 rounded-xl transition-all" type="button">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24">
<path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"></path>
</svg>
<span class="text-sm font-medium">GitHub</span>
</button>
</div>
</form>
</div>
<!-- Footer -->
<p class="text-center mt-8 text-text-muted text-sm">
            Don't have an account? 
            <a class="text-accent hover:text-accent-soft font-bold transition-colors ml-1" href="#">Sign up for free</a>
</p>
</div>
</body></html>
